version: '3.8'

services:
  emotional-support:
    build: .
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - ./:/app
    restart: unless-stopped

# To run: docker-compose up
# To stop: docker-compose down
